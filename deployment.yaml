apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-python-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-python-app
  template:
    metadata:
      labels:
        app: sample-python-app
    spec:
      containers:
      - name: sample-python-app
        image: asia-south1-docker.pkg.dev/project-1-501612/argocd-repo/sample-python-app:4f423f3
        ports:
        - containerPort: 8080
